    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        margin: 0;
        background: var(--theme-page-bg, #ffffff);
        color: #1d1d1f;
      }

      html.dark body {
        color: #f5f5f7;
      }

      .error-container {
        text-align: center;
        max-width: 480px;
        padding: 2.75rem 2rem;
        border-radius: 28px;
      }

      .error-code {
        font-size: clamp(4rem, 16vw, 7rem);
        font-weight: 800;
        background: linear-gradient(135deg, #0071e3, #2997ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 1rem;
      }

      .error-title {
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 700;
        margin-bottom: 0.5rem;
        letter-spacing: -0.02em;
      }

      .error-message {
        font-size: 1.05rem;
        color: #6e6e73;
        margin-bottom: 2rem;
        line-height: 1.6;
      }

      html.dark .error-message {
        color: #a1a1a6;
      }

      .home-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.95rem 1.75rem;
        background: linear-gradient(135deg, #007aff 0%, #0051d5 100%);
        color: #ffffff;
        text-decoration: none;
        border-radius: 999px;
        font-weight: 600;
        font-size: 1rem;
        box-shadow:
          0 4px 14px rgb(0 122 255 / 32%),
          inset 0 1px 0 rgb(255 255 255 / 24%);
        transition:
          transform 0.32s var(--lg-spring, cubic-bezier(0.34, 1.56, 0.64, 1)),
          box-shadow 0.28s ease;
      }

      .home-link:hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow:
          0 8px 22px rgb(0 122 255 / 38%),
          inset 0 1px 0 rgb(255 255 255 / 28%);
      }

      .home-link:focus-visible {
        outline: 2px solid #0071e3;
        outline-offset: 3px;
      }

      @media (prefers-reduced-motion: reduce) {
        .home-link:hover {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="skip-links" role="navigation" aria-label="Skip links">

    <main class="error-container lg-glass-card" id="main-content">
      <div class="error-code" aria-hidden="true">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-message">
        The page you're looking for doesn't exist or has been moved. Let's get you back on track.
      </p>
      <a href="/" class="home-link">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Back to Home
      </a>
    </main>

    <script type="module" src="js/utils/theme.js?v=20260623a"></script>
  </body>
