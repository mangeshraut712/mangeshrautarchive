<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="view-transition" content="same-origin" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <title>Page Not Found | Mangesh Raut Portfolio</title>
    <link rel="icon" type="image/png" href="assets/images/profile-icon.png" />
    <link rel="stylesheet" href="assets/css/apple-2026-design-system.css?v=20260610a" />
    <link rel="stylesheet" href="assets/css/typography-system.css?v=20260610a" />
    <link rel="stylesheet" href="assets/css/sitewide-design-system.css?v=20260423a" />
    <link rel="stylesheet" href="assets/css/accessibility-contrast-fixes.css?v=20260610a" />
    <link rel="stylesheet" href="assets/css/wwdc26-liquid-glass.css?v=20260611b" />
    <script src="js/utils/theme-head.js"></script>
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        margin: 0;
        background: var(--theme-page-bg, #ffffff);
        color: #1d1d1f;
      }

      html.dark body {
        color: #f5f5f7;
      }

      .error-container {
        text-align: center;
        max-width: 480px;
        padding: 2.5rem 2rem;
        border: 1px solid var(--theme-card-border, rgba(0, 0, 0, 0.08));
        border-radius: 24px;
        background: var(--theme-card-surface, #ffffff);
        transition:
          border-color 0.25s ease,
          box-shadow 0.25s ease;
      }

      .error-container:hover {
        border: 1px solid var(--theme-card-border-hover, #0071e3);
        box-shadow: 0 0 0 1px color-mix(in srgb, var(--theme-card-border-hover, #0071e3) 24%, transparent);
      }

      html.dark .error-container {
        border-color: var(--theme-card-border, rgba(255, 255, 255, 0.12));
      }

      html.dark .error-container:hover {
        border: 1px solid var(--theme-card-border-hover, #0a84ff);
        box-shadow: 0 0 0 1px color-mix(in srgb, var(--theme-card-border-hover, #0a84ff) 24%, transparent);
      }

      .error-code {
        font-size: clamp(4rem, 16vw, 7rem);
        font-weight: 800;
        background: linear-gradient(135deg, #0071e3, #2997ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 1rem;
      }

      .error-title {
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 700;
        margin-bottom: 0.5rem;
        letter-spacing: -0.02em;
      }

      .error-message {
        font-size: 1.05rem;
        color: #6e6e73;
        margin-bottom: 2rem;
        line-height: 1.6;
      }

      html.dark .error-message {
        color: #a1a1a6;
      }

      .home-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.95rem 1.75rem;
        background: #0071e3;
        color: #ffffff;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
        font-size: 1rem;
        transition:
          background 0.2s ease,
          transform 0.2s ease;
      }

      .home-link:hover {
        background: #0077ed;
        transform: translateY(-1px);
      }

      .home-link:focus-visible {
        outline: 3px solid #ffcc00;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <div class="skip-links" role="navigation" aria-label="Skip links">
      <a href="#main-content" class="skip-link">Skip to main content</a>
    </div>

    <main class="error-container" id="main-content">
      <div class="error-code" aria-hidden="true">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-message">
        The page you're looking for doesn't exist or has been moved. Let's get you back on track.
      </p>
      <a href="/" class="home-link">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Back to Home
      </a>
    </main>

    <script type="module" src="js/utils/theme.js?v=20260423a"></script>
  </body>
</html>
