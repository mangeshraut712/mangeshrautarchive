<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="You are offline. Reconnect to load Mangesh Raut's portfolio, or retry when your connection returns."
    />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <title>Offline | Mangesh Raut Portfolio</title>
    <link rel="icon" type="image/png" href="assets/images/profile-icon.png" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --text: #1d1d1f;
        --muted: #6e6e73;
        --accent: #0071e3;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #000000;
          --text: #f5f5f7;
          --muted: #a1a1a6;
          --accent: #0a84ff;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      main {
        max-width: 28rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.5rem, 4vw, 2rem);
        letter-spacing: -0.03em;
      }
      p {
        margin: 0 0 1.5rem;
        color: var(--muted);
        line-height: 1.55;
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 0.9rem 1.4rem;
        font: inherit;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #0071e3, #0a84ff);
        cursor: pointer;
      }
      button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }
    </style>
    <link rel="stylesheet" href="assets/css/ux-polish-fixes.css?v=20260716r" />
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>
        This page needs a network connection. Check Wi‑Fi or cellular, then try again. This site
        does not keep a full offline cache (by design, for stability on mobile Safari).
      </p>
      <button type="button" id="retry-btn">Try again</button>
    </main>
    <script>
      document.getElementById('retry-btn')?.addEventListener('click', () => {
        window.location.reload();
      });
    </script>
  </body>
</html>
