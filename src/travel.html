  <body class="travel-body">
    <div class="skip-links" role="navigation" aria-label="Skip links">
      <a href="#main-content" class="skip-link">Skip to main content</a>
    </div>

    <main class="travel-layout" id="main-content" data-travel-app>
      <!-- ─── Map ─── -->
      <div class="travel-map-layer">
        <div
          id="map-container"
          class="travel-map"
          role="application"
          aria-label="World travel map with selectable countries and cities"
        ></div>
      </div>

      <!-- ─── UI Overlay ─── -->
      <div class="travel-ui-layer">
        <!-- Top bar -->
        <nav class="travel-nav" aria-label="Travel navigation">
          <div class="travel-nav__left">
            <a class="travel-nav__home" href="index.html#home" aria-label="Mangesh Raut home">
              <picture>
                <source srcset="assets/images/profile-icon.webp" type="image/webp" />
                <img
                  src="assets/images/profile-icon.png"
                  alt=""
                  width="28"
                  height="28"
                  loading="lazy"
                  decoding="async"
                />
              </picture>
            </a>
            <a class="travel-nav__back" href="index.html#home" aria-label="Back to portfolio home">
              <i class="fas fa-chevron-left" aria-hidden="true"></i>
              <span>Portfolio</span>
            </a>
          </div>
          <div class="travel-nav__brand">
            <span class="travel-nav__kicker">Explore</span>
            <span class="travel-nav__label">Travel Atlas</span>
          </div>
          <div class="travel-nav__actions">
            <button
              id="travel-sidebar-toggle"
              class="travel-nav__panel"
              type="button"
              aria-controls="travel-sidebar"
              aria-expanded="true"
              aria-label="Toggle places panel"
            >
              <i class="fas fa-layer-group" aria-hidden="true"></i>
            </button>
            <button
              id="travel-projection-toggle"
              class="travel-nav__projection"
              type="button"
              aria-label="Switch to flat map"
              aria-pressed="true"
            >
              <i class="fas fa-globe" aria-hidden="true"></i>
            </button>
            <button
              id="travel-theme-toggle"
              class="travel-nav__theme"
              type="button"
              aria-label="Toggle theme"
            >
              <i class="fas fa-moon" aria-hidden="true"></i>
            </button>
          </div>
        </nav>

        <!-- Sidebar -->
        <aside class="travel-sidebar" id="travel-sidebar">
          <button
            class="travel-sidebar__handle"
            id="travel-sidebar-handle"
            type="button"
            aria-controls="travel-timeline"
            aria-expanded="true"
            aria-label="Collapse or expand places panel"
          >
            <span class="travel-sidebar__handle-bar" aria-hidden="true"></span>
          </button>
          <div class="travel-sidebar__header">
            <h1>Travel Atlas</h1>
            <p class="travel-sidebar__subtitle">
              Countries, cities, culture, and places I have visited
            </p>

            <!-- Summary stats -->
            <div class="travel-stats" id="travel-stats">
              <div class="travel-stat">
                <span class="travel-stat__value" id="stat-countries">—</span>
                <span class="travel-stat__label">Countries</span>
              </div>
              <div class="travel-stat">
                <span class="travel-stat__value" id="stat-cities">—</span>
                <span class="travel-stat__label">Cities</span>
              </div>
              <div class="travel-stat">
                <span class="travel-stat__value" id="stat-places">—</span>
                <span class="travel-stat__label">Places</span>
              </div>
              <div class="travel-stat">
                <span class="travel-stat__value" id="stat-regions">—</span>
                <span class="travel-stat__label">Regions</span>
              </div>
            </div>

            <!-- Country pills -->
            <div class="travel-countries" id="country-pills"></div>

            <div class="travel-search" role="search">
              <i class="fas fa-magnifying-glass" aria-hidden="true"></i>
              <input
                id="place-search"
                type="search"
                placeholder="Search city, country, landmark..."
                autocomplete="off"
                aria-label="Search visited places"
              />
              <button
                id="clear-place-search"
                class="travel-search__clear"
                type="button"
                aria-label="Clear search"
              >
                <i class="fas fa-xmark" aria-hidden="true"></i>
              </button>
            </div>

            <div class="travel-advanced-search" id="advanced-search">
              <button
                id="toggle-advanced-search"
                class="travel-advanced-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="advanced-search-content"
              >
                <i class="fas fa-sliders" aria-hidden="true"></i>
                <span>Advanced Filters</span>
                <i class="fas fa-chevron-down" aria-hidden="true"></i>
              </button>
              <div class="travel-advanced-content" id="advanced-search-content">
                <fieldset class="travel-filter-group">
                  <legend>Categories</legend>
                  <div class="travel-filter-chips" id="category-filters">
                    <button
                      class="travel-filter-chip"
                      data-category="food"
                      type="button"
                      aria-pressed="false"
                    >
                      <i class="fas fa-utensils" aria-hidden="true"></i> Food
                    </button>
                    <button
                      class="travel-filter-chip"
                      data-category="culture"
                      type="button"
                      aria-pressed="false"
                    >
                      <i class="fas fa-landmark" aria-hidden="true"></i> Culture
                    </button>
                    <button
                      class="travel-filter-chip"
                      data-category="nature"
                      type="button"
                      aria-pressed="false"
                    >
                      <i class="fas fa-tree" aria-hidden="true"></i> Nature
                    </button>
                    <button
                      class="travel-filter-chip"
                      data-category="urban"
                      type="button"
                      aria-pressed="false"
                    >
                      <i class="fas fa-city" aria-hidden="true"></i> Urban
                    </button>
                    <button
                      class="travel-filter-chip"
                      data-category="history"
                      type="button"
                      aria-pressed="false"
                    >
                      <i class="fas fa-monument" aria-hidden="true"></i> History
                    </button>
                  </div>
                </fieldset>
              </div>
            </div>

            <div class="travel-actions" aria-label="Travel atlas controls">
              <button id="featured-toggle" class="travel-action" type="button" aria-pressed="false">
                <i class="fas fa-star" aria-hidden="true"></i>
                <span>Featured</span>
              </button>
              <button id="spotlight-tour" class="travel-action" type="button" aria-pressed="false">
                <i class="fas fa-play" aria-hidden="true"></i>
                <span>Spotlight</span>
              </button>
              <button
                id="route-layer-toggle"
                class="travel-action active"
                type="button"
                aria-pressed="true"
              >
                <i class="fas fa-route" aria-hidden="true"></i>
                <span>Route</span>
              </button>
              <button
                id="reset-travel-filters"
                class="travel-action travel-action--quiet"
                type="button"
              >
                <i class="fas fa-rotate-left" aria-hidden="true"></i>
                <span>Reset</span>
              </button>
            </div>

            <div
              id="travel-results-summary"
              class="travel-results-summary"
              aria-live="polite"
            ></div>
          </div>

          <div class="travel-timeline" id="travel-timeline">
            <div class="loading-state">
              <div class="loading-spinner"></div>
              <p class="loading-message">Loading places...</p>
            </div>
            <!-- JS-rendered places -->
          </div>
        </aside>

        <div class="travel-map-status" id="travel-map-status" aria-live="polite">
          <span id="travel-status-projection">Globe</span>
          <span id="travel-status-route">Route ready</span>
          <span id="travel-status-active">Select a place</span>
        </div>
      </div>
    </main>
