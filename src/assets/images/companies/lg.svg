<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 60" width="120" height="45">
  <!-- LG Red Face Circle -->
  <circle cx="30" cy="30" r="22" fill="#A50034" />
  
  <!-- 'L' and 'G' paths inside the face -->
  <!-- 'G' outer circle path -->
  <path d="M 44.5 30 C 44.5 38, 38 44.5, 30 44.5 C 22 44.5, 15.5 38, 15.5 30 C 15.5 22, 22 15.5, 30 15.5 C 36 15.5, 41 19, 43 24" 
        fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 'G' inner horizontal line -->
  <path d="M 43 24 L 35 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- 'L' inside the face -->
  <path d="M 30 22 L 30 35 L 39 35" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- White dot representing the eye -->
  <circle cx="23" cy="24" r="2.5" fill="#FFFFFF" />
  
  <!-- LG Wordmark on Right -->
  <text x="62" y="41" fill="#54565B" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="bold" font-size="30" letter-spacing="-0.5">LG</text>
</svg>
