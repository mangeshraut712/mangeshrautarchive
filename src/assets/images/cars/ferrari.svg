  <g clip-path="url(#shield-shape)">
    <!-- Green -->
    <rect x="15" y="15" width="30" height="15" fill="#008F39" />
    <!-- White -->
    <rect x="45" y="15" width="30" height="15" fill="#FFFFFF" />
    <!-- Red -->
    <rect x="75" y="15" width="30" height="15" fill="#C8102E" />
    <!-- Black separation line below the flag -->
    <line x1="15" y1="30" x2="105" y2="30" stroke="#000000" stroke-width="2" />
  </g>

