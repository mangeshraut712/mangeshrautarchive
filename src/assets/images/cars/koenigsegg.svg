<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="120" height="120">
  <!-- Shield Outline with elegant golden border -->
  <path d="M 10,10 L 90,10 L 90,60 C 90,95 50,115 50,115 C 50,115 10,95 10,60 Z" 
        fill="#111111" stroke="#FFD700" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Swedish blue and gold diamond grid pattern (high-fidelity Koenigsegg layout) -->
  <g stroke="#002FA7" stroke-width="0.75" stroke-linejoin="round">
    <!-- Center diamonds (Gold) -->
    <polygon points="50,15 65,30 50,45 35,30" fill="#FFD700" />
    <polygon points="50,45 65,60 50,75 35,60" fill="#FFD700" />
    <polygon points="50,75 65,90 50,105 35,90" fill="#FFD700" />

    <!-- Side diamonds (Blue) -->
    <polygon points="65,30 80,45 65,60 50,45" fill="#002FA7" />
    <polygon points="35,30 50,45 35,60 20,45" fill="#002FA7" />
    <polygon points="65,60 80,75 65,90 50,75" fill="#002FA7" />
    <polygon points="35,60 50,75 35,90 20,75" fill="#002FA7" />

    <!-- Corner/edge filler diamonds -->
    <polygon points="80,45 90,55 80,65 65,60" fill="#FFD700" />
    <polygon points="20,45 10,55 20,65 35,60" fill="#FFD700" />
    <polygon points="80,75 90,85 80,95 65,90" fill="#FFD700" />
    <polygon points="20,75 10,85 20,95 35,90" fill="#FFD700" />
  </g>

  <!-- Red crown/emblem at top center -->
  <circle cx="50" cy="30" r="3.5" fill="#FF3B30" />
  <polygon points="45,26 55,26 50,20" fill="#FFD700" />
</svg>
