# AssistMe chat + API edge (Cloudflare Worker) — Vercel FastAPI-compatible surface
# Deployed by .github/workflows/deploy-chat-worker.yml
name = "assistme-chat"
main = "src/index.js"
compatibility_date = "2026-04-01"
workers_dev = true

[vars]
# Credit-safe default: Nemotron free (MCP-validated). Set to x-ai/grok-4.3 when OpenRouter credits are funded.
OPENROUTER_MODEL = "nvidia/nemotron-3-super-120b-a12b:free"
OPENROUTER_SITE_URL = "https://mangeshraut712.github.io/mangeshrautarchive"
OPENROUTER_SITE_TITLE = "AssistMe Cloudflare Edge"
LASTFM_USERNAME = "mbr63"
# Cloudflare Worker is the primary API for GitHub Pages (Vercel optional/offline).
PRIMARY_HOST = "cloudflare"
ALLOWED_ORIGINS = "https://mangeshraut712.github.io,https://mangeshraut.pro,https://mraut.vercel.app,http://127.0.0.1:4000,http://localhost:4000"

# Primary WHOOP/Withings refresh while Vercel cron is DEPLOYMENT_DISABLED.
[triggers]
crons = ["0 */6 * * *"]
