name: Production Monitoring (Chrome + Lighthouse)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'

permissions:
  contents: read

jobs:
  monitor:
    name: 📈 Monitor ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Vercel Production
            url: https://mangeshraut.pro
            health_url: https://mangeshraut.pro/api/health
            artifact: vercel-monitoring
          - label: GitHub Pages
            url: https://mangeshraut712.github.io/mangeshrautarchive/
            health_url: https://mangeshraut712.github.io/mangeshrautarchive/
            artifact: github-pages-monitoring
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify deployment health
        run: |
          curl --fail --silent --show-error "${{ matrix.health_url }}" >/dev/null
          echo "✅ ${{ matrix.label }} is reachable at ${{ matrix.health_url }}"

      - name: Lighthouse desktop monitoring gate
        run: node scripts/deployment/lighthouse-gate.js --url=${{ matrix.url }} --form-factor=desktop --min-performance=88 --min-accessibility=90 --min-best-practices=90 --min-seo=90

      - name: Lighthouse mobile monitoring gate
        run: node scripts/deployment/lighthouse-gate.js --url=${{ matrix.url }} --form-factor=mobile --min-performance=60 --min-accessibility=90 --min-best-practices=90 --min-seo=90

      - name: Upload monitoring artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/lighthouse
