name: Production Monitoring

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'

permissions:
  contents: read

jobs:
  monitor:
    name: 📈 Production health + Lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify production surfaces are reachable
        run: |
          for url in \
            "https://mangeshraut.pro/" \
            "https://mangeshraut.pro/api/health" \
            "https://mangeshraut712.github.io/mangeshrautarchive/" \
            "https://mangeshraut712.github.io/mangeshrautarchive/build-config.json"
          do
            curl --fail --silent --show-error "$url" >/dev/null
            echo "✅ $url"
          done

      - name: Lighthouse production gates (Vercel)
        run: |
          node scripts/deployment/lighthouse-gate.js --url=https://mangeshraut.pro/ --form-factor=desktop --min-performance=70 --min-accessibility=90 --min-best-practices=90 --min-seo=90
          node scripts/deployment/lighthouse-gate.js --url=https://mangeshraut.pro/ --form-factor=mobile --min-performance=55 --min-accessibility=90 --min-best-practices=90 --min-seo=90

      - name: Compare GitHub Pages and Vercel deployment sync
        run: node scripts/deployment/verify-deployment-sync.js --remote --parity --retries=10 --wait=20

      - name: Upload monitoring artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-monitoring
          path: artifacts/lighthouse
