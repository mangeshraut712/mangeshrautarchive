name: Production Monitoring (Chrome + Lighthouse)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'

permissions:
  contents: read

jobs:
  monitor:
    name: 📈 Monitor ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Vercel Production
            url: https://mangeshraut.pro/
            health_url: https://mangeshraut.pro/api/health
            monitor_url: https://mangeshraut.pro/api/monitor/status
            artifact: vercel-monitoring
          - label: GitHub Pages
            url: https://mangeshraut712.github.io/mangeshrautarchive/
            health_url: https://mangeshraut712.github.io/mangeshrautarchive/
            monitor_url: https://mangeshraut.pro/api/monitor/status
            artifact: github-pages-monitoring
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Setup Chrome for Lighthouse
        run: google-chrome --version

      - name: Verify deployment health
        run: |
          curl --fail --silent --show-error "${{ matrix.health_url }}" >/dev/null
          echo "✅ ${{ matrix.label }} is reachable at ${{ matrix.health_url }}"

      - name: Verify monitor API health
        run: |
          curl --fail --silent --show-error "${{ matrix.monitor_url }}" >/dev/null
          echo "✅ Monitor API reachable for ${{ matrix.label }}"

      - name: Verify key pages render
        run: |
          for page in "" "travel.html" "monitor.html"; do
            curl --fail --silent --show-error "${{ matrix.url }}$page" >/dev/null
            echo "✅ ${{ matrix.label }} page OK: ${page:-index}"
          done

      - name: Verify build-config is published
        run: |
          curl --fail --silent --show-error "${{ matrix.url }}build-config.json" | jq -e '.buildTime and .version' >/dev/null
          echo "✅ ${{ matrix.label }} build-config.json is valid"

      - name: Lighthouse desktop monitoring gate
        run: node scripts/deployment/lighthouse-gate.js --url=${{ matrix.url }} --form-factor=desktop --min-performance=70 --min-accessibility=90 --min-best-practices=90 --min-seo=90

      - name: Lighthouse mobile monitoring gate
        run: node scripts/deployment/lighthouse-gate.js --url=${{ matrix.url }} --form-factor=mobile --min-performance=55 --min-accessibility=90 --min-best-practices=90 --min-seo=90

      - name: Upload monitoring artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/lighthouse

  sync_check:
    name: 🔗 Nightly Deployment Sync Check
    runs-on: ubuntu-latest
    needs: monitor
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Compare GitHub Pages and Vercel production build commits
        run: node scripts/deployment/verify-deployment-sync.js --remote --retries=8 --wait=20
        continue-on-error: true
