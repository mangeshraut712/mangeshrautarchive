name: Production Monitoring

on:
  workflow_dispatch:
  schedule:
    # Daily 14:00 UTC
    - cron: '0 14 * * *'

permissions:
  contents: read
  actions: read

concurrency:
  group: production-monitoring
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  GH_PAGES_BASE: https://mangeshraut712.github.io/mangeshrautarchive
  VERCEL_PROD: https://mangeshraut.pro
  FORCE_COLOR: '1'

jobs:
  monitor:
    name: Production health + Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify production surfaces are reachable
        id: reachability
        run: |
          set -euo pipefail
          urls=(
            "${{ env.VERCEL_PROD }}/"
            "${{ env.VERCEL_PROD }}/api/health"
            "${{ env.VERCEL_PROD }}/api/status"
            "${{ env.VERCEL_PROD }}/api/chat/health"
            "${{ env.VERCEL_PROD }}/systems"
            "${{ env.VERCEL_PROD }}/monitor"
            "${{ env.VERCEL_PROD }}/travel"
            "${{ env.VERCEL_PROD }}/uses"
            "${{ env.VERCEL_PROD }}/build-config.json"
            "${{ env.GH_PAGES_BASE }}/"
            "${{ env.GH_PAGES_BASE }}/travel.html"
            "${{ env.GH_PAGES_BASE }}/monitor.html"
            "${{ env.GH_PAGES_BASE }}/systems.html"
            "${{ env.GH_PAGES_BASE }}/uses.html"
            "${{ env.GH_PAGES_BASE }}/build-config.json"
          )
          failed=0
          ok=0
          {
            echo "### Reachability"
            echo ""
            echo "| URL | Status |"
            echo "| --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"
          for url in "${urls[@]}"; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "$url" || echo "000")
            if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ] || [ "$code" = "308" ]; then
              echo "✅ $url ($code)"
              echo "| \`$url\` | ✅ $code |" >> "$GITHUB_STEP_SUMMARY"
              ok=$((ok + 1))
            else
              echo "❌ $url ($code)"
              echo "| \`$url\` | ❌ $code |" >> "$GITHUB_STEP_SUMMARY"
              failed=1
            fi
          done
          echo "ok_count=$ok" >> "$GITHUB_OUTPUT"
          exit "$failed"

      - name: Doctor — production env parity
        id: doctor
        continue-on-error: true
        run: |
          set -euo pipefail
          if npm run doctor:full; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Doctor"
            echo "- doctor:full ✅" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "status=warn" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Doctor"
            echo "- doctor:full ⚠️ (non-blocking)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Capture dual-host commit SHAs
        id: commits
        continue-on-error: true
        run: |
          set -euo pipefail
          pages=$(curl -fsS --max-time 15 "${{ env.GH_PAGES_BASE }}/build-config.json" \
            | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).gitCommit" || echo "unknown")
          vercel=$(curl -fsS --max-time 15 "${{ env.VERCEL_PROD }}/build-config.json" \
            | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).gitCommit" || echo "unknown")
          echo "pages=$pages" >> "$GITHUB_OUTPUT"
          echo "vercel=$vercel" >> "$GITHUB_OUTPUT"
          {
            echo ""
            echo "### Deployed commits"
            echo "| Host | gitCommit |"
            echo "| --- | --- |"
            echo "| GitHub Pages | \`$pages\` |"
            echo "| Vercel | \`$vercel\` |"
            if [ "$pages" != "unknown" ] && [ "$vercel" != "unknown" ] && [ "$pages" = "$vercel" ]; then
              echo ""
              echo "Parity: ✅ matching"
            else
              echo ""
              echo "Parity: ⚠️ check dashboard / wait for CDN"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Lighthouse — live GitHub Pages quality floor
        run: |
          node scripts/deployment/lighthouse-gate.js \
            --url=${{ env.GH_PAGES_BASE }}/ \
            --form-factor=desktop \
            --min-performance=90 \
            --min-accessibility=90 \
            --min-best-practices=90 \
            --min-seo=90 \
            --max-attempts=3
          node scripts/deployment/lighthouse-gate.js \
            --url=${{ env.GH_PAGES_BASE }}/ \
            --form-factor=mobile \
            --min-performance=85 \
            --min-accessibility=90 \
            --min-best-practices=90 \
            --min-seo=90 \
            --max-attempts=5

      - name: Lighthouse — live Vercel quality floor
        # Live Vercel includes AssistMe + third-party scripts; keep realistic floors.
        continue-on-error: true
        run: |
          node scripts/deployment/lighthouse-gate.js \
            --url=${{ env.VERCEL_PROD }}/ \
            --form-factor=desktop \
            --min-performance=55 \
            --min-accessibility=90 \
            --min-best-practices=90 \
            --min-seo=90 \
            --max-attempts=3
          node scripts/deployment/lighthouse-gate.js \
            --url=${{ env.VERCEL_PROD }}/ \
            --form-factor=mobile \
            --min-performance=55 \
            --min-accessibility=90 \
            --min-best-practices=90 \
            --min-seo=90 \
            --max-attempts=3

      - name: Compare GitHub Pages and Vercel deployment sync
        continue-on-error: true
        run: node scripts/deployment/verify-deployment-sync.js --remote --parity --retries=12 --wait=20

      - name: Job summary
        if: always()
        run: |
          {
            echo ""
            echo "## Production monitoring"
            echo ""
            echo "| Surface | URL |"
            echo "| --- | --- |"
            echo "| Vercel | ${{ env.VERCEL_PROD }} |"
            echo "| GitHub Pages | ${{ env.GH_PAGES_BASE }} |"
            echo ""
            echo "Schedule: daily 14:00 UTC · also \`workflow_dispatch\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload monitoring artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-monitoring
          path: artifacts/lighthouse
          if-no-files-found: ignore
          retention-days: 14
