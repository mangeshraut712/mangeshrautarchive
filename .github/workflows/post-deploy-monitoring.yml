name: Production Monitoring

on:
  workflow_dispatch:
  schedule:
    # Daily 14:00 UTC
    - cron: '0 14 * * *'

permissions:
  contents: read
  actions: read

concurrency:
  group: production-monitoring
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  GH_PAGES_BASE: https://mangeshraut712.github.io/mangeshrautarchive
  EDGE_API: https://assistme-chat.mangeshraut712.workers.dev
  VERCEL_PROD: https://mangeshraut.pro
  FORCE_COLOR: '1'

jobs:
  monitor:
    name: Production health + Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify GitHub Pages + Cloudflare edge (required)
        id: reachability
        run: |
          set -euo pipefail
          urls=(
            "${{ env.GH_PAGES_BASE }}/"
            "${{ env.GH_PAGES_BASE }}/travel.html"
            "${{ env.GH_PAGES_BASE }}/monitor.html"
            "${{ env.GH_PAGES_BASE }}/systems.html"
            "${{ env.GH_PAGES_BASE }}/uses.html"
            "${{ env.GH_PAGES_BASE }}/changelog.html"
            "${{ env.GH_PAGES_BASE }}/blog/index.html"
            "${{ env.GH_PAGES_BASE }}/build-config.json"
            "${{ env.EDGE_API }}/api/health"
            "${{ env.EDGE_API }}/api/status"
            "${{ env.EDGE_API }}/api/chat/health"
            "${{ env.EDGE_API }}/api/health-vitals/summary"
            "${{ env.EDGE_API }}/api/integrations/status"
            "${{ env.EDGE_API }}/api/music/recent"
          )
          failed=0
          ok=0
          {
            echo "### Reachability (Pages + Cloudflare edge — required)"
            echo ""
            echo "| URL | Status |"
            echo "| --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"
          for url in "${urls[@]}"; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "$url" || echo "000")
            if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ] || [ "$code" = "308" ]; then
              echo "✅ $url ($code)"
              echo "| \`$url\` | ✅ $code |" >> "$GITHUB_STEP_SUMMARY"
              ok=$((ok + 1))
            else
              echo "❌ $url ($code)"
              echo "| \`$url\` | ❌ $code |" >> "$GITHUB_STEP_SUMMARY"
              failed=1
            fi
          done
          echo "ok_count=$ok" >> "$GITHUB_OUTPUT"
          exit "$failed"

      - name: Soft-check Vercel / custom domain (optional while DEPLOYMENT_DISABLED)
        continue-on-error: true
        run: |
          set -euo pipefail
          urls=(
            "${{ env.VERCEL_PROD }}/"
            "${{ env.VERCEL_PROD }}/api/health"
            "${{ env.VERCEL_PROD }}/api/chat/health"
          )
          {
            echo ""
            echo "### Vercel surface (soft — may be DEPLOYMENT_DISABLED)"
            echo ""
            echo "| URL | Status |"
            echo "| --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"
          for url in "${urls[@]}"; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "$url" || echo "000")
            if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ] || [ "$code" = "308" ]; then
              echo "| \`$url\` | ✅ $code |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| \`$url\` | ⚠️ $code (non-blocking) |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Doctor — production env parity
        id: doctor
        continue-on-error: true
        run: |
          set -euo pipefail
          if npm run doctor:full; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Doctor"
            echo "- doctor:full ✅" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "status=warn" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Doctor"
            echo "- doctor:full ⚠️ (non-blocking)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Capture Pages + edge commit SHAs
        id: commits
        continue-on-error: true
        run: |
          set -euo pipefail
          pages=$(curl -fsS --max-time 15 "${{ env.GH_PAGES_BASE }}/build-config.json" \
            | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).gitCommit" || echo "unknown")
          edge=$(curl -fsS --max-time 15 "${{ env.EDGE_API }}/api/health" \
            | node -pe "const d=JSON.parse(require('fs').readFileSync(0,'utf8')); d.gitCommit||d.commit||d.version||'edge'" || echo "edge")
          echo "pages=$pages" >> "$GITHUB_OUTPUT"
          echo "edge=$edge" >> "$GITHUB_OUTPUT"
          {
            echo ""
            echo "### Deployed commits"
            echo "| Host | gitCommit |"
            echo "| --- | --- |"
            echo "| GitHub Pages | \`$pages\` |"
            echo "| Cloudflare edge | \`$edge\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Warm GitHub Pages CDN before Lighthouse
        run: |
          set -euo pipefail
          # Prime CDN/edge caches so live Lighthouse is less sensitive to cold starts.
          for _ in 1 2 3; do
            curl -fsS --max-time 20 "${{ env.GH_PAGES_BASE }}/" >/dev/null
            sleep 2
          done

      - name: Lighthouse — live GitHub Pages (desktop)
        id: lh_pages_desktop
        run: |
          node scripts/deployment/lighthouse-gate.js \
            --url=${{ env.GH_PAGES_BASE }}/ \
            --form-factor=desktop \
            --min-performance=90 \
            --min-accessibility=90 \
            --min-best-practices=90 \
            --min-seo=90 \
            --max-attempts=4

      - name: Lighthouse — live GitHub Pages (mobile)
        id: lh_pages_mobile
        run: |
          node scripts/deployment/lighthouse-gate.js \
            --url=${{ env.GH_PAGES_BASE }}/ \
            --form-factor=mobile \
            --min-performance=85 \
            --min-accessibility=90 \
            --min-best-practices=90 \
            --min-seo=90 \
            --max-attempts=5

      - name: Lighthouse — live Vercel quality floor
        # Soft while Vercel may be DEPLOYMENT_DISABLED.
        id: lh_vercel
        continue-on-error: true
        run: |
          node scripts/deployment/lighthouse-gate.js \
            --url=${{ env.VERCEL_PROD }}/ \
            --form-factor=desktop \
            --min-performance=55 \
            --min-accessibility=90 \
            --min-best-practices=90 \
            --min-seo=90 \
            --max-attempts=2

      - name: Compare GitHub Pages and Vercel deployment sync
        continue-on-error: true
        run: node scripts/deployment/verify-deployment-sync.js --remote --parity --retries=3 --wait=10

      - name: Job summary
        if: always()
        run: |
          mark() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              skipped|cancelled) echo "⏭️" ;;
              *) echo "•" ;;
            esac
          }
          {
            echo ""
            echo "## Production monitoring"
            echo ""
            echo "| Surface | URL |"
            echo "| --- | --- |"
            echo "| GitHub Pages (primary) | ${{ env.GH_PAGES_BASE }} |"
            echo "| Cloudflare edge API | ${{ env.EDGE_API }} |"
            echo "| Vercel (optional) | ${{ env.VERCEL_PROD }} |"
            echo ""
            echo "| Check | Status |"
            echo "| --- | --- |"
            echo "| Reachability | $(mark '${{ steps.reachability.outcome }}') |"
            echo "| Lighthouse Pages desktop | $(mark '${{ steps.lh_pages_desktop.outcome }}') |"
            echo "| Lighthouse Pages mobile | $(mark '${{ steps.lh_pages_mobile.outcome }}') |"
            echo "| Lighthouse Vercel | $(mark '${{ steps.lh_vercel.outcome }}') (soft) |"
            echo ""
            echo "Schedule: daily 14:00 UTC · also \`workflow_dispatch\`."
            echo "Hard gates: Pages + Worker only. Vercel is soft while DEPLOYMENT_DISABLED."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload monitoring artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-monitoring
          path: artifacts/lighthouse
          if-no-files-found: ignore
          retention-days: 14
