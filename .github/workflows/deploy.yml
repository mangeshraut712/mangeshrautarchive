name: CI → Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: 🔍 Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: 🔒 Security — dependency vulnerability audit
        run: npm audit --audit-level=high --omit=dev

      - name: 🔒 Security — scan for exposed API keys
        run: npm run security-check

      - name: 🧹 Lint — ESLint code quality check
        run: npm run lint

      - name: 🎨 Lint — Stylelint CSS quality check
        run: npm run lint:css

      - name: 📝 Format — Prettier check
        run: npm run format:check

      - name: 🧪 Tests — Vitest unit tests
        run: npm test

      - name: 🩺 React Doctor — static React graph audit
        run: npm run doctor:full

      - name: 🐍 Python — setup and lint
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv venv --clear
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          uv pip install -r requirements.txt -r requirements-dev.txt

      - name: 🐍 Python — lint and dead-code scan
        run: |
          npm run lint:dead-code
          npm run lint:python

      - name: 🐍 Python — API tests
        run: npm run test:api

      - name: ✅ Browser QA — smoke + accessibility
        run: npm run qa:browser:ci

      - name: ⚡ Lighthouse gates — desktop + mobile
        run: npm run qa:lighthouse:ci
        env:
          OPENROUTER_SITE_URL: https://mangeshraut712.github.io/mangeshrautarchive
          OPENROUTER_APP_TITLE: AssistMe Portfolio Assistant
          OPENROUTER_MODEL: x-ai/grok-4.3
          NEXT_PUBLIC_API_BASE: https://mangeshraut.pro
          NODE_ENV: production
          GITHUB_PAGES: true
          GITHUB_SHA: ${{ github.sha }}

      - name: 📦 Upload verified Pages build
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: pages-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 1

      - name: 📦 Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qa-artifacts
          path: |
            artifacts/playwright-report
            artifacts/lighthouse

  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Download verified Pages build
        uses: actions/download-artifact@v7
        with:
          name: pages-dist-${{ github.sha }}
          path: dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: 🚀 Deploy to GitHub Pages
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  verify-surfaces:
    name: ✅ Verify GitHub Pages live
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Verify core pages respond
        run: |
          BASE="https://mangeshraut712.github.io/mangeshrautarchive"
          for attempt in $(seq 1 12); do
            failed=0
            for path in "" "travel.html" "monitor.html" "build-config.json"; do
              if curl --fail --silent --show-error "${BASE}/${path}" >/dev/null; then
                echo "✅ ${BASE}/${path}"
              else
                failed=1
              fi
            done

            if [ "$failed" -eq 0 ]; then
              exit 0
            fi

            echo "Waiting for GitHub Pages CDN (${attempt}/12)..."
            sleep 5
          done

          exit 1

      - name: Verify deployed commit matches push
        run: |
          BASE="https://mangeshraut712.github.io/mangeshrautarchive"
          for attempt in $(seq 1 12); do
            REMOTE_COMMIT=$(curl --fail --silent --show-error \
              "${BASE}/build-config.json" \
              | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).gitCommit")
            echo "Remote commit: ${REMOTE_COMMIT}"
            echo "Expected commit: ${{ github.sha }}"

            if [ "${REMOTE_COMMIT}" = "${{ github.sha }}" ]; then
              exit 0
            fi

            echo "Waiting for deployed commit (${attempt}/12)..."
            sleep 5
          done

          exit 1
