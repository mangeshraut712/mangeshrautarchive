name: CI → Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─────────────────────────────────────────
  # Quality Gates (run on every push & PR)
  # ─────────────────────────────────────────
  quality:
    name: 🔍 Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: 🔒 Security — dependency vulnerability audit
        run: npm audit --audit-level=high --omit=dev

      - name: 🔒 Security — scan for exposed API keys
        run: npm run security-check

      - name: 🧹 Lint — ESLint code quality check
        run: npm run lint

      - name: 🎨 Lint — Stylelint CSS quality check
        run: npm run lint:css

      - name: 🩺 React Doctor — React codebase health check
        run: npm run doctor:full

      - name: 🧪 Tests — Vitest unit tests
        run: npm test

      - name: 🐍 Python — setup and lint
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv venv --clear
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          uv pip install -r requirements.txt -r requirements-dev.txt

      - name: 🐍 Python — lint and dead-code scan
        run: |
          npm run lint:dead-code
          python -m flake8 api/ --max-line-length=120 --ignore=E501,W503,W291,W293

      - name: 🐍 Python — API tests
        run: npm run test:api

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 🌐 Setup Chrome for Playwright
        run: npx playwright install --with-deps chromium

      - name: ✅ Chrome smoke tests
        run: npm run qa:smoke

      - name: ♿ Chrome accessibility baseline
        run: npm run qa:a11y

      - name: 📸 Chrome visual regression test
        run: npm run qa:visual:ci

      - name: ⚡ Lighthouse desktop gate
        run: npm run qa:lighthouse:desktop

      - name: 📱 Lighthouse mobile gate
        run: npm run qa:lighthouse:mobile

      - name: 📦 Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-qa-artifacts
          path: |
            artifacts/playwright-report
            artifacts/lighthouse

  # ─────────────────────────────────────────
  # Build & Deploy (main branch only)
  # ─────────────────────────────────────────
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: 🏗️ Build for GitHub Pages
        run: npm run build
        env:
          OPENROUTER_SITE_URL: https://mangeshraut712.github.io/mangeshrautarchive
          OPENROUTER_APP_TITLE: AssistMe Portfolio Assistant
          OPENROUTER_MODEL: x-ai/grok-4.1-fast
          NEXT_PUBLIC_API_BASE: https://mangeshraut.pro
          NODE_ENV: production
          GITHUB_PAGES: true
          GITHUB_SHA: ${{ github.sha }}
          NEXT_PUBLIC_LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: 🚀 Deploy to GitHub Pages
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  post_deploy_validation:
    name: 🧪 Post-Deploy · ${{ matrix.label }}
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: GitHub Pages
            base_url: https://mangeshraut712.github.io/mangeshrautarchive/
          - label: Vercel Production
            base_url: https://mangeshraut.pro/
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Setup Chrome for Playwright
        run: npx playwright install --with-deps chromium

      - name: Wait for deployment to propagate
        run: |
          echo "⏳ Waiting for ${{ matrix.label }} to propagate (30s)..."
          sleep 30

      - name: Run post-deploy smoke + baseline accessibility
        env:
          PLAYWRIGHT_BASE_URL: ${{ matrix.base_url }}
        run: npm run qa:postdeploy
        continue-on-error: true

      - name: Upload post-deploy QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-${{ strategy.job-index }}-chrome-artifacts
          path: |
            artifacts/playwright-report

  sync_deployments:
    name: 🔗 Verify GitHub Pages ↔ Vercel Sync
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Compare live build-config across deployment surfaces
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/deployment/verify-deployment-sync.js --remote --commit=${{ github.sha }} --retries=24 --wait=15
        continue-on-error: true
