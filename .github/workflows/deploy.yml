name: CI → Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: 🔍 Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: 🔒 Security — dependency vulnerability audit
        run: npm audit --audit-level=high --omit=dev

      - name: 🔒 Security — scan for exposed API keys
        run: npm run security-check

      - name: 🧹 Lint — ESLint code quality check
        run: npm run lint

      - name: 🎨 Lint — Stylelint CSS quality check
        run: npm run lint:css

      - name: 🧪 Tests — Vitest unit tests
        run: npm test

      - name: 🩺 React Doctor — static React graph audit
        continue-on-error: true
        run: npm run doctor:full

      - name: 🐍 Python — setup and lint
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv venv --clear
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          uv pip install -r requirements.txt -r requirements-dev.txt

      - name: 🐍 Python — lint and dead-code scan
        run: |
          npm run lint:dead-code
          python -m flake8 api/ --max-line-length=120 --ignore=E501,W503,W291,W293

      - name: 🐍 Python — API tests
        run: npm run test:api

      - name: ✅ Browser QA — smoke + accessibility
        run: npm run qa:browser:ci

      - name: ⚡ Lighthouse gates — desktop + mobile
        run: npm run qa:lighthouse:ci

      - name: 📦 Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qa-artifacts
          path: |
            artifacts/playwright-report
            artifacts/lighthouse

  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: 🏗️ Build for GitHub Pages
        run: npm run build
        env:
          OPENROUTER_SITE_URL: https://mangeshraut712.github.io/mangeshrautarchive
          OPENROUTER_APP_TITLE: AssistMe Portfolio Assistant
          OPENROUTER_MODEL: x-ai/grok-4.1-fast
          NEXT_PUBLIC_API_BASE: https://mangeshraut.pro
          NODE_ENV: production
          GITHUB_PAGES: true
          GITHUB_SHA: ${{ github.sha }}
          NEXT_PUBLIC_LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: 🚀 Deploy to GitHub Pages
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-surfaces:
    name: ✅ Verify GitHub Pages live
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for GitHub Pages CDN
        run: sleep 30

      - name: Verify core pages respond
        run: |
          BASE="https://mangeshraut712.github.io/mangeshrautarchive"
          for path in "" "travel.html" "monitor.html" "build-config.json"; do
            curl --fail --silent --show-error "${BASE}/${path}" >/dev/null
            echo "✅ ${BASE}/${path}"
          done

      - name: Verify deployed commit matches push
        run: |
          REMOTE_COMMIT=$(curl --fail --silent --show-error \
            "https://mangeshraut712.github.io/mangeshrautarchive/build-config.json" \
            | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).gitCommit")
          echo "Remote commit: ${REMOTE_COMMIT}"
          echo "Expected commit: ${{ github.sha }}"
          test "${REMOTE_COMMIT}" = "${{ github.sha }}"
