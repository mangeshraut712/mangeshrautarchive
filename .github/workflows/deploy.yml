name: CI → Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers

jobs:
  # ─────────────────────────────────────────
  # Quality Gates (run on every push & PR)
  # ─────────────────────────────────────────
  quality:
    name: 🔍 Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: pw-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: pw-chromium-

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: 🔒 Security — scan for exposed API keys
        run: npm run security-check

      - name: 🧹 Lint — ESLint code quality check
        run: npm run lint

      - name: 🧪 Tests — Vitest unit tests
        run: npm test

      - name: 🌐 Setup Chrome for Playwright
        run: npx playwright install --with-deps chromium

      - name: ✅ Chrome smoke tests
        run: npm run qa:smoke
        timeout-minutes: 5

      - name: ♿ Chrome accessibility baseline
        run: npm run qa:a11y
        timeout-minutes: 5

      - name: ⚡ Lighthouse desktop gate
        run: npm run qa:lighthouse:desktop
        timeout-minutes: 5

      - name: 📱 Lighthouse mobile gate
        run: npm run qa:lighthouse:mobile
        timeout-minutes: 5

      - name: 📦 Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chrome-qa-artifacts
          path: |
            artifacts/playwright-report
            artifacts/lighthouse
          retention-days: 7

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 🐍 Python — lint with flake8
        run: pip install flake8 && flake8 api/ --max-line-length=120 --ignore=E501,W503

  # ─────────────────────────────────────────
  # Build & Deploy (main branch only)
  # ─────────────────────────────────────────
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Setup Chrome for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run post-deploy smoke + baseline accessibility
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: npm run qa:postdeploy
        timeout-minutes: 5

      - name: Upload post-deploy QA artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: post-deploy-chrome-artifacts
          path: |
            artifacts/playwright-report
          retention-days: 7

  # ─────────────────────────────────────────
  # Deploy to GitHub Pages
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build for production
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
