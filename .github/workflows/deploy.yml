name: CI → Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least privilege by default; deploy job elevates Pages permissions.
permissions:
  contents: read

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  # Cancel stale PR runs; keep main deploy queue intact for ordered Pages releases.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'
  GH_PAGES_BASE: https://mangeshraut712.github.io/mangeshrautarchive
  VERCEL_PROD: https://mangeshraut.pro

jobs:
  quality:
    name: 🔍 Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: 🔒 Security — dependency vulnerability audit
        run: npm audit --audit-level=high --omit=dev

      - name: 🔒 Security — scan for exposed API keys
        run: npm run security-check

      - name: 🧹 Lint — ESLint code quality check
        run: npm run lint

      - name: 🎨 Lint — Stylelint CSS quality check
        run: npm run lint:css

      - name: 📝 Format — Prettier check
        run: npm run format:check

      - name: 🧪 Tests — Vitest unit tests
        run: npm test

      - name: 🩺 Env parity — production API surface (non-blocking)
        # Needs no Vercel CLI token in CI; still probes live API health when available.
        continue-on-error: true
        run: npm run doctor:full

      - name: 🐍 Python — setup
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv venv --clear
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          uv pip install -r requirements.txt -r requirements-dev.txt

      - name: 🐍 Python — dead-code scan
        run: npm run lint:dead-code

      - name: 🐍 Python — flake8 lint
        run: npm run lint:python

      - name: 🐍 Python — API tests
        run: npm run test:api

      - name: 🌐 Install Playwright browser runtime
        run: npx playwright install --with-deps chromium

      - name: ✅ Browser QA — smoke + accessibility
        run: |
          set -euo pipefail
          NO_RELOAD=1 npm run dev &
          DEV_PID=$!
          trap 'kill $DEV_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:4000/ >/dev/null; then
              echo "Dev server ready (${i}s)"
              break
            fi
            if [ "$i" -eq 45 ]; then
              echo "Dev server failed to start"
              exit 1
            fi
            sleep 1
          done
          npm run qa:browser:ci

      - name: ⚡ Lighthouse gates — desktop + mobile (dist)
        run: |
          set -euo pipefail
          lsof -ti:4000 | xargs kill -9 2>/dev/null || true
          npm run build
          PORT=4000 npm run serve:dist &
          SERVE_PID=$!
          trap 'kill $SERVE_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:4000/ >/dev/null; then
              echo "Production server ready (${i}s)"
              break
            fi
            if [ "$i" -eq 45 ]; then
              echo "serve:dist failed to start"
              exit 1
            fi
            sleep 1
          done
          node scripts/deployment/lighthouse-gate.js \
            --url=http://127.0.0.1:4000/ \
            --form-factor=desktop \
            --min-performance=95 \
            --min-accessibility=95 \
            --min-best-practices=95 \
            --min-seo=95 \
            --max-attempts=3
          node scripts/deployment/lighthouse-gate.js \
            --url=http://127.0.0.1:4000/ \
            --form-factor=mobile \
            --min-performance=90 \
            --min-accessibility=95 \
            --min-best-practices=95 \
            --min-seo=95 \
            --max-attempts=3
        env:
          OPENROUTER_SITE_URL: https://mangeshraut712.github.io/mangeshrautarchive
          OPENROUTER_APP_TITLE: AssistMe Portfolio Assistant
          OPENROUTER_MODEL: x-ai/grok-4.3
          NEXT_PUBLIC_API_BASE: https://mangeshraut.pro
          NODE_ENV: production
          GITHUB_PAGES: true
          GITHUB_SHA: ${{ github.sha }}

      - name: 📦 Upload verified Pages build
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: pages-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 2

      - name: 📦 Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qa-artifacts-${{ github.sha }}
          path: |
            artifacts/playwright-report
            artifacts/lighthouse
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: 📦 Package Pages artifact
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Download verified Pages build
        uses: actions/download-artifact@v8
        with:
          name: pages-dist-${{ github.sha }}
          path: dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-surfaces:
    name: ✅ Dual-surface deploy verify
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify GitHub Pages core paths
        run: |
          set -euo pipefail
          BASE="${{ env.GH_PAGES_BASE }}"
          PATHS=("" "index.html" "travel.html" "monitor.html" "systems.html" "uses.html" "404.html" "build-config.json" "service-worker.js" "manifest.json")
          for attempt in $(seq 1 18); do
            failed=0
            for path in "${PATHS[@]}"; do
              url="${BASE}/${path}"
              if curl --fail --silent --show-error --max-time 15 "$url" >/dev/null; then
                echo "✅ $url"
              else
                echo "⏳ $url"
                failed=1
              fi
            done
            if [ "$failed" -eq 0 ]; then
              exit 0
            fi
            echo "Waiting for GitHub Pages CDN (${attempt}/18)..."
            sleep 10
          done
          exit 1

      - name: Verify GitHub Pages commit matches push
        run: |
          set -euo pipefail
          BASE="${{ env.GH_PAGES_BASE }}"
          EXPECTED="${{ github.sha }}"
          for attempt in $(seq 1 18); do
            REMOTE_COMMIT=$(curl --fail --silent --show-error --max-time 15 \
              "${BASE}/build-config.json" \
              | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).gitCommit")
            echo "Remote Pages commit: ${REMOTE_COMMIT}"
            echo "Expected commit:     ${EXPECTED}"
            if [ "${REMOTE_COMMIT}" = "${EXPECTED}" ]; then
              echo "✅ GitHub Pages commit matches"
              exit 0
            fi
            echo "Waiting for Pages commit (${attempt}/18)..."
            sleep 10
          done
          exit 1

      - name: Verify Vercel production commit + API health
        run: |
          set -euo pipefail
          BASE="${{ env.VERCEL_PROD }}"
          EXPECTED="${{ github.sha }}"
          # Vercel deploys independently from the Git integration; allow longer catch-up.
          for attempt in $(seq 1 24); do
            health=$(curl -sS -o /tmp/health.json -w "%{http_code}" --max-time 15 "${BASE}/api/health" || true)
            if [ "$health" != "200" ]; then
              echo "⏳ API health HTTP ${health} (${attempt}/24)"
              sleep 15
              continue
            fi
            REMOTE_COMMIT=$(curl --fail --silent --show-error --max-time 15 \
              "${BASE}/build-config.json" \
              | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).gitCommit" || true)
            echo "Remote Vercel commit: ${REMOTE_COMMIT:-unknown}"
            echo "Expected commit:      ${EXPECTED}"
            if [ "${REMOTE_COMMIT}" = "${EXPECTED}" ]; then
              echo "✅ Vercel production commit matches + API healthy"
              # Smoke a few key surfaces
              for path in "" "systems" "monitor" "travel" "uses" "api/status"; do
                code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "${BASE}/${path}")
                echo "  ${BASE}/${path} → ${code}"
                case "$code" in
                  200|301|302|308) ;;
                  *) echo "Unexpected status for ${path}"; exit 1 ;;
                esac
              done
              exit 0
            fi
            echo "Waiting for Vercel deploy (${attempt}/24)..."
            sleep 15
          done
          echo "::warning::Vercel production has not reached ${EXPECTED} yet (GitHub Pages is live). Check Vercel dashboard."
          # Soft-fail Vercel lag so Pages deploys are not blocked when Vercel is slow/queued.
          exit 0

      - name: Dual-surface commit parity (best effort)
        run: |
          set -euo pipefail
          # Prefer exact push SHA when both surfaces have caught up; otherwise report parity state.
          node scripts/deployment/verify-deployment-sync.js \
            --remote \
            --commit="${{ github.sha }}" \
            --retries=6 \
            --wait=20 \
            || node scripts/deployment/verify-deployment-sync.js \
              --remote \
              --parity \
              --retries=3 \
              --wait=15 \
            || echo "::warning::Surfaces not fully in parity yet; nightly monitor will recheck."
