name: CI → Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least privilege by default; deploy job elevates Pages permissions.
permissions:
  contents: read
  actions: read

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  # Cancel stale PR runs; keep main deploy queue intact for ordered Pages releases.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'
  GH_PAGES_BASE: https://mangeshraut712.github.io/mangeshrautarchive
  VERCEL_PROD: https://mangeshraut.pro
  FORCE_COLOR: '1'

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 50
    outputs:
      pages_artifact: ${{ steps.meta.outputs.pages_artifact }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        # package-lock can lag transitive pins; install (not ci) matches local AGENTS.md path.
        run: npm install --no-audit --no-fund

      - name: Doctor — stack + root hygiene
        # Fail-fast before lint/tests: layout allow-list, forbidden framework deps, pins.
        run: |
          set -euo pipefail
          echo "## Doctor" >> "$GITHUB_STEP_SUMMARY"
          npm run doctor
          echo "- doctor ✅ (layout + stack guard)" >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve Playwright version
        id: pw
        run: |
          VER=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Playwright $VER"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Security — dependency vulnerability audit
        run: npm audit --audit-level=high --omit=dev

      - name: Security — scan for exposed secrets
        run: npm run security-check

      - name: Lint — ESLint (JS)
        run: npm run lint

      - name: Lint — Stylelint (CSS)
        run: npm run lint:css

      - name: Format — Prettier check
        run: npm run format:check

      - name: Unit tests — Vitest
        run: npm test

      - name: Doctor — env / production API surface (non-blocking)
        # Probes live API when reachable; does not require Vercel tokens in CI.
        continue-on-error: true
        run: |
          set -euo pipefail
          if npm run doctor:full; then
            echo "- doctor:full ✅" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- doctor:full ⚠️ (non-blocking)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Setup Python (uv)
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv venv --clear
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          uv pip install -r requirements.txt -r requirements-dev.txt

      - name: Python — dead-code scan
        run: npm run lint:dead-code

      - name: Python — flake8
        run: npm run lint:python

      - name: API tests — pytest
        run: npm run test:api

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Browser QA — smoke + accessibility
        run: |
          set -euo pipefail
          NO_RELOAD=1 npm run dev &
          DEV_PID=$!
          trap 'kill $DEV_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:4000/ >/dev/null 2>&1; then
              echo "Dev server ready (${i}s)"
              break
            fi
            if ! kill -0 "$DEV_PID" 2>/dev/null; then
              echo "Dev server exited early"
              exit 1
            fi
            if [ "$i" -eq 60 ]; then
              echo "Dev server failed to start"
              exit 1
            fi
            sleep 1
          done
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:4000 \
            npx playwright test \
              tests/e2e/smoke.spec.js \
              tests/e2e/accessibility.spec.js \
              --project="Desktop Chrome"
          npm run qa:browser:ci

      - name: Build production bundle
        run: npm run build
        env:
          OPENROUTER_SITE_URL: https://mangeshraut712.github.io/mangeshrautarchive
          OPENROUTER_APP_TITLE: AssistMe Portfolio Assistant
          # Free-first when Grok/paid fails; server chain still tries free models
          OPENROUTER_MODEL: openrouter/free
          # Cloudflare Worker is the primary API for GitHub Pages (Vercel optional).
          CHAT_API_BASE: ${{ vars.CHAT_API_BASE != '' && vars.CHAT_API_BASE || 'https://assistme-chat.mangeshraut712.workers.dev' }}
          NEXT_PUBLIC_API_BASE: ${{ vars.CHAT_API_BASE != '' && vars.CHAT_API_BASE || vars.EDGE_API_BASE != '' && vars.EDGE_API_BASE || 'https://assistme-chat.mangeshraut712.workers.dev' }}
          EDGE_API_BASE: ${{ vars.EDGE_API_BASE != '' && vars.EDGE_API_BASE || 'https://assistme-chat.mangeshraut712.workers.dev' }}
          OPENROUTER_SITE_URL: ${{ vars.PAGES_SITE_URL != '' && vars.PAGES_SITE_URL || 'https://mangeshraut712.github.io/mangeshrautarchive' }}
          NODE_ENV: production
          GITHUB_PAGES: true
          GITHUB_SHA: ${{ github.sha }}

      - name: Lighthouse gates — desktop + mobile (dist)
        id: lighthouse
        run: |
          set -euo pipefail
          lsof -ti:4000 | xargs kill -9 2>/dev/null || true
          PORT=4000 npm run serve:dist &
          SERVE_PID=$!
          trap 'kill $SERVE_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:4000/ >/dev/null 2>&1; then
              echo "Production server ready (${i}s)"
              break
            fi
            if ! kill -0 "$SERVE_PID" 2>/dev/null; then
              echo "serve:dist exited early"
              exit 1
            fi
            if [ "$i" -eq 60 ]; then
              echo "serve:dist failed to start"
              exit 1
            fi
            sleep 1
          done
          node scripts/deployment/lighthouse-gate.js \
            --url=http://127.0.0.1:4000/ \
            --form-factor=desktop \
            --min-performance=100 \
            --min-accessibility=100 \
            --min-best-practices=100 \
            --min-seo=100 \
            --max-attempts=3
          node scripts/deployment/lighthouse-gate.js \
            --url=http://127.0.0.1:4000/ \
            --form-factor=mobile \
            --min-performance=100 \
            --min-accessibility=100 \
            --min-best-practices=100 \
            --min-seo=100 \
            --max-attempts=3

      - name: Quality job summary
        if: always()
        run: |
          mark() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              skipped|cancelled) echo "⏭️" ;;
              *) echo "•" ;;
            esac
          }
          {
            echo "## Quality gates"
            echo ""
            echo "| Check | Status |"
            echo "| --- | --- |"
            echo "| Security + lint + unit + API | $(mark success) ran in this job |"
            echo "| Browser QA (Playwright) | $(mark success) ran in this job |"
            echo "| Lighthouse desktop + mobile (dist) | $(mark '${{ steps.lighthouse.outcome }}') |"
            echo "| Doctor (env/API) | ⚠️ non-blocking |"
            echo ""
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- SHA: \`${{ github.sha }}\`"
            if [ -d artifacts/lighthouse ]; then
              echo ""
              echo "### Lighthouse artifacts"
              echo '```'
              ls -1 artifacts/lighthouse 2>/dev/null | head -20 || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Meta outputs
        id: meta
        run: echo "pages_artifact=pages-dist-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Upload verified Pages build
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: pages-dist-${{ github.sha }}
          path: dist
          # Required so /.well-known/security.txt (and other dotdirs) reach GitHub Pages.
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 2

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qa-artifacts-${{ github.sha }}
          path: |
            artifacts/playwright-report
            artifacts/lighthouse
            artifacts/test-results
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Package Pages artifact
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Download verified Pages build
        uses: actions/download-artifact@v8
        with:
          name: pages-dist-${{ github.sha }}
          path: dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
          # Required: default tar step uses --exclude=.[^/]* so .nojekyll and
          # .well-known/security.txt never reach GitHub Pages without this flag.
          include-hidden-files: true

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  verify-surfaces:
    name: Dual-surface deploy verify
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify GitHub Pages core paths
        run: |
          set -euo pipefail
          BASE="${{ env.GH_PAGES_BASE }}"
          PATHS=("" "index.html" "travel.html" "monitor.html" "systems.html" "uses.html" "404.html" "build-config.json" "service-worker.js" "manifest.json")
          for attempt in $(seq 1 18); do
            failed=0
            for path in "${PATHS[@]}"; do
              url="${BASE}/${path}"
              if curl --fail --silent --show-error --max-time 15 "$url" >/dev/null; then
                echo "✅ $url"
              else
                echo "⏳ $url"
                failed=1
              fi
            done
            if [ "$failed" -eq 0 ]; then
              exit 0
            fi
            echo "Waiting for GitHub Pages CDN (${attempt}/18)..."
            sleep 10
          done
          exit 1

      - name: Verify GitHub Pages commit matches push
        run: |
          set -euo pipefail
          BASE="${{ env.GH_PAGES_BASE }}"
          EXPECTED="${{ github.sha }}"
          for attempt in $(seq 1 18); do
            REMOTE_COMMIT=$(curl --fail --silent --show-error --max-time 15 \
              "${BASE}/build-config.json" \
              | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).gitCommit")
            echo "Remote Pages commit: ${REMOTE_COMMIT}"
            echo "Expected commit:     ${EXPECTED}"
            if [ "${REMOTE_COMMIT}" = "${EXPECTED}" ]; then
              echo "✅ GitHub Pages commit matches"
              exit 0
            fi
            echo "Waiting for Pages commit (${attempt}/18)..."
            sleep 10
          done
          exit 1

      - name: Verify Vercel production commit + API health
        run: |
          set -euo pipefail
          BASE="${{ env.VERCEL_PROD }}"
          EXPECTED="${{ github.sha }}"
          # Vercel deploys independently (often faster than this job). Accept exact match
          # OR a newer main commit that already includes this SHA (push-train race).
          for attempt in $(seq 1 12); do
            health=$(curl -sS -o /tmp/health.json -w "%{http_code}" --max-time 15 "${BASE}/api/health" || true)
            if [ "$health" != "200" ]; then
              echo "⏳ API health HTTP ${health} (${attempt}/12)"
              sleep 10
              continue
            fi
            REMOTE_COMMIT=$(curl --fail --silent --show-error --max-time 15 \
              "${BASE}/build-config.json" \
              | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).gitCommit" || true)
            echo "Remote Vercel commit: ${REMOTE_COMMIT:-unknown}"
            echo "Expected commit:      ${EXPECTED}"
            MATCH=0
            if [ "${REMOTE_COMMIT}" = "${EXPECTED}" ]; then
              MATCH=1
            elif [ -n "${REMOTE_COMMIT}" ] && git cat-file -e "${REMOTE_COMMIT}^{commit}" 2>/dev/null \
              && git merge-base --is-ancestor "${EXPECTED}" "${REMOTE_COMMIT}" 2>/dev/null; then
              echo "✅ Vercel is ahead of this push (includes expected commit)"
              MATCH=1
            fi
            if [ "$MATCH" -eq 1 ]; then
              echo "✅ Vercel production healthy for this train"
              for path in "" "systems" "monitor" "travel" "uses" "api/status"; do
                code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "${BASE}/${path}")
                echo "  ${BASE}/${path} → ${code}"
                case "$code" in
                  200|301|302|308) ;;
                  *) echo "Unexpected status for ${path}"; exit 1 ;;
                esac
              done
              exit 0
            fi
            echo "Waiting for Vercel deploy (${attempt}/12)..."
            sleep 10
          done
          echo "::warning::Vercel production has not reached ${EXPECTED} yet (GitHub Pages is live). Check Vercel dashboard."
          # Soft-fail Vercel lag so Pages deploys are not blocked when Vercel is slow/queued.
          exit 0

      - name: Doctor — production env parity (non-blocking)
        continue-on-error: true
        run: npm run doctor:full

      - name: Dual-surface commit parity (best effort)
        run: |
          set -euo pipefail
          node scripts/deployment/verify-deployment-sync.js \
            --remote \
            --commit="${{ github.sha }}" \
            --retries=6 \
            --wait=20 \
            || node scripts/deployment/verify-deployment-sync.js \
              --remote \
              --parity \
              --retries=3 \
              --wait=15 \
            || echo "::warning::Surfaces not fully in parity yet; nightly monitor will recheck."

      - name: Deploy verify summary
        if: always()
        run: |
          {
            echo "## Dual-surface verify"
            echo ""
            echo "| Surface | URL |"
            echo "| --- | --- |"
            echo "| GitHub Pages | ${{ env.GH_PAGES_BASE }} |"
            echo "| Vercel | ${{ env.VERCEL_PROD }} |"
            echo ""
            echo "Expected SHA: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
