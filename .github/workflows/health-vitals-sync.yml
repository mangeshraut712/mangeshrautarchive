# Edge WHOOP/Withings → Supabase sync for GitHub Pages.
# Needed while Vercel production is DEPLOYMENT_DISABLED (cron there cannot run).

name: Health vitals sync (edge)

on:
  schedule:
    # Every 30m keepalive (WHOOP access ~1h; refresh tokens rotate each refresh)
    - cron: '10,40 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: health-vitals-edge-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Trigger Cloudflare health sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call edge cron endpoint
        env:
          INTEGRATION_SYNC_ADMIN_TOKEN: ${{ secrets.INTEGRATION_SYNC_ADMIN_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          EDGE_URL: https://assistme-chat.mangeshraut712.workers.dev
        run: |
          set -euo pipefail
          TOKEN="${CRON_SECRET:-${INTEGRATION_SYNC_ADMIN_TOKEN:-}}"
          if [ -z "$TOKEN" ]; then
            echo "::error::Missing CRON_SECRET or INTEGRATION_SYNC_ADMIN_TOKEN"
            exit 1
          fi

          BODY=""
          CODE="000"
          for attempt in 1 2 3; do
            RESP=$(curl -sS -w "\n%{http_code}" \
              --connect-timeout 10 \
              --max-time 90 \
              -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/json" \
              "${EDGE_URL}/api/cron/health-vitals-sync" || true)
            BODY=$(printf '%s' "$RESP" | sed '$d')
            CODE=$(printf '%s' "$RESP" | tail -n1)
            echo "Attempt ${attempt}/3 → HTTP ${CODE}"
            echo "$BODY" | head -c 2000
            echo
            if [ "$CODE" = "200" ]; then
              break
            fi
            # Retry transient edge/network failures only.
            if [ "$attempt" -lt 3 ] && echo "$CODE" | grep -Eq '^(000|408|425|429|5[0-9]{2})$'; then
              sleep $((attempt * 5))
              continue
            fi
            break
          done

          if [ "$CODE" != "200" ]; then
            echo "::error::Health vitals sync failed with HTTP ${CODE}"
            exit 1
          fi
          echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('success') is True, d; print('saved=', d.get('saved')); print('results=', d.get('results'))"
          {
            echo "## Health vitals sync"
            echo "- Edge: \`${EDGE_URL}\`"
            echo "- HTTP: 200"
          } >> "$GITHUB_STEP_SUMMARY"
