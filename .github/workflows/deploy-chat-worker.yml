# Deploy AssistMe Cloudflare Worker (FastAPI-compatible chat + github + music)
# Secrets (accepts either name):
#   OPENROUTER_API_KEY
#   CLOUDFLARE_API_TOKEN  or  CLOUDFARE_API_KEY  (typo-tolerant)
#   CLOUDFLARE_ACCOUNT_ID (optional — auto-detected from API if missing)
#   LASTFM_API_KEY (optional)
# After deploy, sets repo Variable CHAT_API_BASE when permissions allow.

name: Deploy AssistMe Chat Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/assistme-chat/**'
      - '.github/workflows/deploy-chat-worker.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: assistme-chat-worker
  cancel-in-progress: true

jobs:
  verify-openrouter:
    name: Verify OpenRouter secret
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe OpenRouter free model
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "::error::OPENROUTER_API_KEY secret is missing."
            exit 1
          fi
          echo "Key length: ${#OPENROUTER_API_KEY}"
          HTTP=$(curl -sS -o /tmp/or.json -w "%{http_code}" \
            -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://mangeshraut712.github.io/mangeshrautarchive" \
            -H "X-Title: AssistMe CI Probe" \
            -d '{"model":"google/gemma-4-26b-a4b-it:free","messages":[{"role":"user","content":"Reply with exactly: ok"}],"max_tokens":32}')
          echo "OpenRouter HTTP $HTTP"
          head -c 500 /tmp/or.json; echo
          if [ "$HTTP" != "200" ]; then
            echo "::warning::OpenRouter probe HTTP $HTTP — worker still deploys with local fallback."
          else
            echo "## OpenRouter" >> "$GITHUB_STEP_SUMMARY"
            echo "- Secret present; free model probe HTTP 200." >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-worker:
    name: Deploy Cloudflare Worker
    needs: verify-openrouter
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      worker_url: ${{ steps.deploy.outputs.worker_url }}
      deployed: ${{ steps.cf.outputs.present }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve Cloudflare credentials
        id: cf
        env:
          # Prefer canonical API Token; accept user typo CLOUDFARE_API_KEY (Global Key or Token)
          CF_TOKEN_A: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_TOKEN_B: ${{ secrets.CLOUDFARE_API_KEY }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
        run: |
          set -euo pipefail
          TOKEN="${CF_TOKEN_A:-${CF_TOKEN_B:-}}"
          ACCOUNT="${CF_ACCOUNT:-}"
          # Global API Key needs account email (secret CLOUDFLARE_EMAIL preferred)
          EMAIL="${CF_EMAIL:-}"
          AUTH_MODE="token"
          if [ -z "$TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Cloudflare Worker — not deployed"
              echo "Missing token secret. Add **CLOUDFLARE_API_TOKEN** (or **CLOUDFARE_API_KEY**)."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "token_len=${#TOKEN}" >> "$GITHUB_OUTPUT"

          # 1) API Token (Bearer)
          RESP=$(curl -sS -H "Authorization: Bearer ${TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts?per_page=5" || echo '{}')
          mapfile -t _PARSED < <(echo "$RESP" | python3 scripts/deployment/cf-parse-accounts.py)
          SUCCESS="${_PARSED[0]:-FAIL}"
          ACCOUNT_FROM="${_PARSED[1]:-}"
          ERR="${_PARSED[2]:-}"

          # 2) Global API Key + Email candidates
          if [ "$SUCCESS" != "OK" ]; then
            EMAILS=()
            [ -n "$EMAIL" ] && EMAILS+=("$EMAIL")
            EMAILS+=("mangeshraut71298@gmail.com" "mbr63@drexel.edu")
            for TRY_EMAIL in "${EMAILS[@]}"; do
              RESP=$(curl -sS -H "X-Auth-Email: ${TRY_EMAIL}" -H "X-Auth-Key: ${TOKEN}" \
                "https://api.cloudflare.com/client/v4/accounts?per_page=5" || echo '{}')
              mapfile -t _PARSED < <(echo "$RESP" | python3 scripts/deployment/cf-parse-accounts.py)
              SUCCESS="${_PARSED[0]:-FAIL}"
              ACCOUNT_FROM="${_PARSED[1]:-}"
              ERR="${_PARSED[2]:-}"
              if [ "$SUCCESS" = "OK" ]; then
                AUTH_MODE="global"
                EMAIL="$TRY_EMAIL"
                break
              fi
            done
          fi

          if [ -z "$ACCOUNT" ]; then
            ACCOUNT="$ACCOUNT_FROM"
          fi

          # If we have explicit account + token, try deploy even when list failed
          # (some tokens can deploy without Account List permission)
          if [ "$SUCCESS" != "OK" ] && [ -n "$ACCOUNT" ]; then
            SUCCESS="OK"
            AUTH_MODE="token"
            echo "Using explicit CLOUDFLARE_ACCOUNT_ID without list permission"
          fi

          if [ "$SUCCESS" != "OK" ] || [ -z "$ACCOUNT" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Cloudflare Worker — auth/account failed"
              echo "- Secret present (${#TOKEN} chars)"
              echo "- API success: \`${SUCCESS}\` — ${ERR:-unknown}"
              echo "- Tried Bearer token + Global Key with candidate emails"
              echo ""
              echo "**Create a proper API Token (recommended):**"
              echo "1. Cloudflare → My Profile → API Tokens → Create Token"
              echo "2. Template **Edit Cloudflare Workers** (or custom: Account.Workers Scripts:Edit, Account.Account Settings:Read)"
              echo "3. Save as GitHub secret \`CLOUDFLARE_API_TOKEN\` (or \`CLOUDFARE_API_KEY\`)"
              echo "4. Optional: \`CLOUDFLARE_ACCOUNT_ID\` from Workers dashboard right sidebar"
            } >> "$GITHUB_STEP_SUMMARY"
            # Log response shape (no secrets) for debugging
            echo "$RESP" | head -c 300 >> "$GITHUB_STEP_SUMMARY" || true
            exit 0
          fi

          echo "present=true" >> "$GITHUB_OUTPUT"
          echo "account_id=$ACCOUNT" >> "$GITHUB_OUTPUT"
          echo "auth_mode=$AUTH_MODE" >> "$GITHUB_OUTPUT"
          {
            echo "CLOUDFLARE_ACCOUNT_ID=$ACCOUNT"
            echo "CF_AUTH_MODE=$AUTH_MODE"
            if [ "$AUTH_MODE" = "global" ]; then
              echo "CLOUDFLARE_API_KEY=$TOKEN"
              echo "CLOUDFLARE_EMAIL=$EMAIL"
            else
              echo "CLOUDFLARE_API_TOKEN=$TOKEN"
            fi
          } >> "$GITHUB_ENV"
          echo "## Cloudflare credentials" >> "$GITHUB_STEP_SUMMARY"
          echo "- Auth mode: \`${AUTH_MODE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Account: \`${ACCOUNT:0:8}…\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node
        if: steps.cf.outputs.present == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Deploy with Wrangler (API Token)
        id: deploy
        if: steps.cf.outputs.present == 'true' && steps.cf.outputs.auth_mode != 'global'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/assistme-chat
          command: deploy
          secrets: |
            OPENROUTER_API_KEY
            LASTFM_API_KEY
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}

      - name: Deploy with Wrangler (Global API Key)
        id: deploy_global
        if: steps.cf.outputs.present == 'true' && steps.cf.outputs.auth_mode == 'global'
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/assistme-chat
          command: deploy
          secrets: |
            OPENROUTER_API_KEY
            LASTFM_API_KEY
        env:
          CLOUDFLARE_API_KEY: ${{ env.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ env.CLOUDFLARE_EMAIL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}

      - name: Capture worker URL
        if: steps.cf.outputs.present == 'true'
        id: url
        run: |
          set -euo pipefail
          LOG="${{ steps.deploy.outputs.command-output || steps.deploy_global.outputs.command-output || '' }}"
          URL=$(echo "$LOG" | grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' | head -1 || true)
          if [ -z "$URL" ]; then
            if [ "${CF_AUTH_MODE:-token}" = "global" ]; then
              AUTH_H=(-H "X-Auth-Email: ${CLOUDFLARE_EMAIL}" -H "X-Auth-Key: ${CLOUDFLARE_API_KEY}")
            else
              AUTH_H=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
            fi
            SUB=$(curl -sS "${AUTH_H[@]}" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print((d.get('result') or {}).get('subdomain',''))" || true)
            if [ -n "$SUB" ]; then
              URL="https://assistme-chat.${SUB}.workers.dev"
            fi
          fi
          echo "worker_url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Worker URL: ${URL:-unknown}"
          {
            echo "## AssistMe Chat Worker"
            echo "- Deployed: \`assistme-chat\`"
            echo "- URL: ${URL:-see Wrangler logs}"
            echo "- Endpoints: \`/api/chat\`, \`/api/chat/health\`, \`/api/github/repos/public\`, \`/api/music/recent\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set CHAT_API_BASE repository variable
        if: steps.cf.outputs.present == 'true' && steps.url.outputs.worker_url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKER_URL: ${{ steps.url.outputs.worker_url }}
        run: |
          set -euo pipefail
          # Requires variables:write — may fail on default GITHUB_TOKEN; non-fatal
          if gh variable set CHAT_API_BASE --body "$WORKER_URL" 2>/tmp/var-err.txt; then
            echo "Set CHAT_API_BASE=$WORKER_URL"
            echo "- Set repo variable \`CHAT_API_BASE\` = \`$WORKER_URL\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Could not set CHAT_API_BASE automatically. Set it manually to $WORKER_URL"
            cat /tmp/var-err.txt || true
            echo "- **Manual step:** set Variable \`CHAT_API_BASE\` = \`$WORKER_URL\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Smoke test worker health + chat
        if: steps.cf.outputs.present == 'true' && steps.url.outputs.worker_url != ''
        env:
          WORKER_URL: ${{ steps.url.outputs.worker_url }}
        run: |
          set -euo pipefail
          BASE="${WORKER_URL%/}"
          echo "Health:"
          curl -sS -m 20 "${BASE}/api/chat/health" | head -c 800; echo
          echo "Chat (non-stream):"
          HTTP=$(curl -sS -m 60 -o /tmp/chat.json -w "%{http_code}" \
            -X POST "${BASE}/api/chat" \
            -H "Content-Type: application/json" \
            -H "Origin: https://mangeshraut712.github.io" \
            -d '{"message":"What are Mangesh top skills?","stream":false}')
          echo "HTTP $HTTP"
          head -c 600 /tmp/chat.json; echo
          if [ "$HTTP" != "200" ]; then
            echo "::warning::Chat smoke returned HTTP $HTTP"
          fi
