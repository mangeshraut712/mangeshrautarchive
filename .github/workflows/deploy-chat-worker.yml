# Deploy AssistMe Cloudflare Worker (FastAPI-compatible for GitHub Pages)
#
# Secrets:
#   OPENROUTER_API_KEY     — required (chat models)
#   CLOUDFLARE_API_TOKEN   — preferred (Workers Edit token)
#   CLOUDFARE_API_KEY      — accepted alias (typo-tolerant)
#   CLOUDFLARE_ACCOUNT_ID  — optional if token can list accounts
#   CLOUDFLARE_EMAIL       — only for Global API Key auth
#   LASTFM_API_KEY         — optional music proxy
#
# After deploy, sets Variable CHAT_API_BASE when possible.

name: Deploy AssistMe Chat Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/assistme-chat/**'
      - '.github/workflows/deploy-chat-worker.yml'
      - 'scripts/deployment/cf-parse-accounts.py'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: assistme-chat-worker
  cancel-in-progress: true

jobs:
  verify-openrouter:
    name: Verify OpenRouter secret
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe OpenRouter free model
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "::error::OPENROUTER_API_KEY secret is missing."
            exit 1
          fi
          echo "OPENROUTER_API_KEY length: ${#OPENROUTER_API_KEY}"
          HTTP=$(curl -sS -o /tmp/or.json -w "%{http_code}" \
            -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://mangeshraut712.github.io/mangeshrautarchive" \
            -H "X-Title: AssistMe CI Probe" \
            -d '{"model":"google/gemma-4-26b-a4b-it:free","messages":[{"role":"user","content":"Reply with exactly: ok"}],"max_tokens":32}')
          echo "OpenRouter HTTP $HTTP"
          head -c 400 /tmp/or.json; echo
          if [ "$HTTP" != "200" ]; then
            echo "::warning::OpenRouter free probe HTTP $HTTP — worker still deploys."
          else
            echo "## OpenRouter" >> "$GITHUB_STEP_SUMMARY"
            echo "- Secret OK; free model probe HTTP 200." >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-worker:
    name: Deploy Cloudflare Worker
    needs: verify-openrouter
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve Cloudflare credentials
        id: cf
        env:
          CF_TOKEN_A: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_TOKEN_B: ${{ secrets.CLOUDFARE_API_KEY }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
        run: |
          set -euo pipefail
          # Prefer CLOUDFLARE_API_TOKEN; accept typo CLOUDFARE_API_KEY
          RAW="${CF_TOKEN_A:-${CF_TOKEN_B:-}}"
          # Strip whitespace / wrapping quotes that break headers
          TOKEN=$(printf '%s' "$RAW" | tr -d '\r\n\t' | sed -e 's/^["'\'']//' -e 's/["'\'']$//')
          ACCOUNT=$(printf '%s' "${CF_ACCOUNT:-}" | tr -d '\r\n\t ')
          EMAIL=$(printf '%s' "${CF_EMAIL:-}" | tr -d '\r\n\t ')
          AUTH_MODE="token"

          if [ -z "$TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::error::No Cloudflare token secret. Add CLOUDFLARE_API_TOKEN (Workers Edit template)."
            exit 1
          fi

          echo "token_len=${#TOKEN}"
          echo "token_prefix=$(printf '%s' "$TOKEN" | head -c 4)…"
          # Shape hints (no secret leak)
          if printf '%s' "$TOKEN" | grep -Eq '^[0-9a-fA-F]{37}$'; then
            echo "shape=global_api_key_hex37"
          elif printf '%s' "$TOKEN" | grep -Eq '^[A-Za-z0-9_-]{40,}$'; then
            echo "shape=likely_api_token"
          else
            echo "shape=unknown (len=${#TOKEN})"
          fi

          # --- Auth probe ---
          RESP=$(curl -sS -H "Authorization: Bearer ${TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts?per_page=5" || echo '{}')
          mapfile -t _P < <(echo "$RESP" | python3 scripts/deployment/cf-parse-accounts.py)
          SUCCESS="${_P[0]:-FAIL}"
          ACCOUNT_FROM="${_P[1]:-}"
          ERR="${_P[2]:-}"
          echo "bearer_probe=${SUCCESS} err=${ERR:-none}"

          if [ "$SUCCESS" != "OK" ]; then
            EMAILS=()
            [ -n "$EMAIL" ] && EMAILS+=("$EMAIL")
            EMAILS+=("mangeshraut71298@gmail.com" "mbr63@drexel.edu")
            for TRY in "${EMAILS[@]}"; do
              RESP=$(curl -sS -H "X-Auth-Email: ${TRY}" -H "X-Auth-Key: ${TOKEN}" \
                "https://api.cloudflare.com/client/v4/accounts?per_page=5" || echo '{}')
              mapfile -t _P < <(echo "$RESP" | python3 scripts/deployment/cf-parse-accounts.py)
              SUCCESS="${_P[0]:-FAIL}"
              ACCOUNT_FROM="${_P[1]:-}"
              ERR="${_P[2]:-}"
              echo "global_probe email=${TRY} success=${SUCCESS} err=${ERR:-none}"
              if [ "$SUCCESS" = "OK" ]; then
                AUTH_MODE="global"
                EMAIL="$TRY"
                break
              fi
            done
          fi

          if [ -z "$ACCOUNT" ]; then
            ACCOUNT="$ACCOUNT_FROM"
          fi

          # Allow deploy with explicit account even if list failed (limited tokens)
          if [ "$SUCCESS" != "OK" ] && [ -n "$ACCOUNT" ]; then
            echo "Using CLOUDFLARE_ACCOUNT_ID without Account:Read"
            SUCCESS="OK"
            AUTH_MODE="token"
          fi

          if [ "$SUCCESS" != "OK" ] || [ -z "$ACCOUNT" ]; then
            {
              echo "## Cloudflare deploy blocked — invalid API credential"
              echo ""
              echo "| Check | Result |"
              echo "| --- | --- |"
              echo "| Secret length | ${#TOKEN} |"
              echo "| Probe | ${SUCCESS} — ${ERR:-unknown} |"
              echo ""
              echo "Your \`CLOUDFARE_API_KEY\` is **not** a valid Cloudflare API Token"
              echo "(\`Invalid format for X-Auth-Key\` / invalid Bearer)."
              echo ""
              echo "### Fix (2 minutes)"
              echo "1. Open https://dash.cloudflare.com/profile/api-tokens"
              echo "2. **Create Token** → template **Edit Cloudflare Workers** → Continue → Create"
              echo "3. Copy the token once"
              echo "4. GitHub → Settings → Secrets → Actions → **New repository secret**:"
              echo "   - Name: \`CLOUDFLARE_API_TOKEN\`"
              echo "   - Value: *(paste token)*"
              echo "5. Optional: \`CLOUDFLARE_ACCOUNT_ID\` from Workers dashboard (right sidebar)"
              echo "6. Re-run this workflow"
              echo ""
              echo "Do **not** paste Global API Key digests, Origin CA keys, or random hex."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Cloudflare credential invalid (${ERR:-auth failed}). Create API Token 'Edit Cloudflare Workers' as CLOUDFLARE_API_TOKEN."
            exit 1
          fi

          echo "present=true" >> "$GITHUB_OUTPUT"
          echo "account_id=$ACCOUNT" >> "$GITHUB_OUTPUT"
          echo "auth_mode=$AUTH_MODE" >> "$GITHUB_OUTPUT"
          {
            echo "CLOUDFLARE_ACCOUNT_ID=$ACCOUNT"
            if [ "$AUTH_MODE" = "global" ]; then
              echo "CLOUDFLARE_API_KEY=$TOKEN"
              echo "CLOUDFLARE_EMAIL=$EMAIL"
            else
              echo "CLOUDFLARE_API_TOKEN=$TOKEN"
            fi
          } >> "$GITHUB_ENV"
          echo "## Cloudflare auth" >> "$GITHUB_STEP_SUMMARY"
          echo "- mode: \`${AUTH_MODE}\` · account: \`${ACCOUNT:0:8}…\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node
        if: steps.cf.outputs.present == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Register workers.dev subdomain
        if: steps.cf.outputs.present == 'true'
        env:
          ACCOUNT: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CF_KEY: ${{ env.CLOUDFLARE_API_KEY }}
          CF_EMAIL: ${{ env.CLOUDFLARE_EMAIL }}
        run: |
          set -euo pipefail
          # Need a workers.dev subdomain before first publish (non-interactive CI)
          SUB="mangeshraut712"
          if [ -n "${TOKEN:-}" ]; then
            AUTH=(-H "Authorization: Bearer ${TOKEN}")
          else
            AUTH=(-H "X-Auth-Email: ${CF_EMAIL}" -H "X-Auth-Key: ${CF_KEY}")
          fi
          # Check existing
          EXIST=$(curl -sS "${AUTH[@]}" \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT}/workers/subdomain" || echo '{}')
          HAVE=$(echo "$EXIST" | python3 -c "import sys,json; d=json.load(sys.stdin); print((d.get('result') or {}).get('subdomain',''))" || true)
          if [ -n "$HAVE" ]; then
            echo "workers.dev subdomain already registered: $HAVE"
            echo "subdomain=$HAVE" >> "$GITHUB_OUTPUT"
            echo "CF_WORKERS_SUBDOMAIN=$HAVE" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "Registering workers.dev subdomain: $SUB"
          RESP=$(curl -sS -X PUT "${AUTH[@]}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT}/workers/subdomain" \
            --data "{\"subdomain\":\"${SUB}\"}" || echo '{}')
          echo "$RESP" | head -c 500; echo
          OK=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success',False))" || true)
          if [ "$OK" != "True" ]; then
            # Try POST if PUT not supported
            RESP=$(curl -sS -X POST "${AUTH[@]}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT}/workers/subdomain" \
              --data "{\"subdomain\":\"${SUB}\"}" || echo '{}')
            echo "$RESP" | head -c 500; echo
            OK=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success',False))" || true)
          fi
          if [ "$OK" != "True" ]; then
            echo "::error::Could not register workers.dev subdomain. Open https://dash.cloudflare.com/${ACCOUNT}/workers/onboarding once, then re-run."
            exit 1
          fi
          echo "CF_WORKERS_SUBDOMAIN=$SUB" >> "$GITHUB_ENV"
          echo "Registered workers.dev subdomain: $SUB"

      - name: Deploy Worker (API Token)
        id: deploy
        if: steps.cf.outputs.present == 'true' && steps.cf.outputs.auth_mode != 'global'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/assistme-chat
          wranglerVersion: '4.111.0'
          command: deploy
          secrets: |
            OPENROUTER_API_KEY
            LASTFM_API_KEY
            GITHUB_PAT
            SUPABASE_URL
            SUPABASE_SERVICE_ROLE_KEY
            SUPABASE_HEALTH_TABLE
            AI_GATEWAY_API_KEY
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_HEALTH_TABLE: ${{ secrets.SUPABASE_HEALTH_TABLE }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}

      - name: Deploy Worker (Global API Key)
        id: deploy_global
        if: steps.cf.outputs.present == 'true' && steps.cf.outputs.auth_mode == 'global'
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/assistme-chat
          wranglerVersion: '4.111.0'
          command: deploy
          secrets: |
            OPENROUTER_API_KEY
            LASTFM_API_KEY
            GITHUB_PAT
            SUPABASE_URL
            SUPABASE_SERVICE_ROLE_KEY
            SUPABASE_HEALTH_TABLE
            AI_GATEWAY_API_KEY
        env:
          CLOUDFLARE_API_KEY: ${{ env.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ env.CLOUDFLARE_EMAIL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_HEALTH_TABLE: ${{ secrets.SUPABASE_HEALTH_TABLE }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}

      - name: Resolve worker URL
        if: steps.cf.outputs.present == 'true'
        id: url
        env:
          # Do not interpolate wrangler command-output into the script body —
          # multiline logs break bash (e.g. "Cloudflare: command not found").
          DEPLOY_LOG: ${{ steps.deploy.outputs.command-output }}
          DEPLOY_LOG_GLOBAL: ${{ steps.deploy_global.outputs.command-output }}
        run: |
          set -euo pipefail
          URL=""
          # Prefer subdomain we registered / discovered earlier
          if [ -n "${CF_WORKERS_SUBDOMAIN:-}" ]; then
            URL="https://assistme-chat.${CF_WORKERS_SUBDOMAIN}.workers.dev"
          fi
          # Fallback: scrape wrangler logs from env (safe multiline)
          if [ -z "$URL" ]; then
            LOG="${DEPLOY_LOG:-${DEPLOY_LOG_GLOBAL:-}}"
            URL=$(printf '%s' "$LOG" | grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' | head -1 || true)
          fi
          # Fallback: Cloudflare API
          if [ -z "$URL" ]; then
            if [ -n "${CLOUDFLARE_API_KEY:-}" ] && [ -n "${CLOUDFLARE_EMAIL:-}" ]; then
              SUB=$(curl -sS -H "X-Auth-Email: ${CLOUDFLARE_EMAIL}" -H "X-Auth-Key: ${CLOUDFLARE_API_KEY}" \
                "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print((d.get('result') or {}).get('subdomain',''))" || true)
            else
              SUB=$(curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print((d.get('result') or {}).get('subdomain',''))" || true)
            fi
            [ -n "${SUB:-}" ] && URL="https://assistme-chat.${SUB}.workers.dev"
          fi
          # Last resort known default for this account
          if [ -z "$URL" ]; then
            URL="https://assistme-chat.mangeshraut712.workers.dev"
            echo "::warning::Using default workers.dev URL; verify in Cloudflare dashboard."
          fi
          echo "worker_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Worker URL: $URL"
          {
            echo "## AssistMe Chat Worker live"
            echo "- **URL:** $URL"
            echo "- Endpoints: \`/api/chat\`, \`/api/chat/health\`, \`/api/github/repos/public\`, \`/api/music/recent\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set CHAT_API_BASE variable
        if: steps.url.outputs.worker_url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKER_URL: ${{ steps.url.outputs.worker_url }}
        run: |
          if gh variable set CHAT_API_BASE --body "$WORKER_URL"; then
            echo "CHAT_API_BASE=$WORKER_URL"
            echo "- Set repo variable \`CHAT_API_BASE\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Set Variable CHAT_API_BASE=$WORKER_URL manually"
            echo "- **Manual:** Variable \`CHAT_API_BASE\` = \`$WORKER_URL\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Smoke test chat
        if: steps.url.outputs.worker_url != ''
        env:
          BASE: ${{ steps.url.outputs.worker_url }}
        run: |
          set -euo pipefail
          BASE="${BASE%/}"
          echo "== health =="
          curl -sS -m 20 -A 'Mozilla/5.0' -H 'Accept: application/json' "${BASE}/api/chat/health" | tee /tmp/health.json | head -c 600; echo
          echo "== reach =="
          curl -sS -m 20 -A 'Mozilla/5.0' -H 'Accept: application/json' "${BASE}/api/analytics/reach" | head -c 400; echo
          echo "== health-vitals =="
          curl -sS -m 20 -A 'Mozilla/5.0' -H 'Accept: application/json' "${BASE}/api/health-vitals/summary" | head -c 400; echo
          echo "== monitor =="
          curl -sS -m 20 -A 'Mozilla/5.0' -H 'Accept: application/json' "${BASE}/api/monitor/status" | head -c 400; echo
          echo "== github =="
          curl -sS -m 20 -A 'Mozilla/5.0' -H 'Accept: application/json' \
            "${BASE}/api/github/repos/public?username=mangeshraut712&limit=2" | head -c 300; echo
          echo "== chat =="
          HTTP=$(curl -sS -m 90 -o /tmp/chat.json -w "%{http_code}" \
            -X POST "${BASE}/api/chat" \
            -H "Content-Type: application/json" \
            -H "Origin: https://mangeshraut712.github.io" \
            -d '{"message":"What are Mangesh top skills?","stream":false}')
          echo "HTTP $HTTP"
          head -c 800 /tmp/chat.json; echo
          test "$HTTP" = "200"
          python3 - <<'PY'
          import json
          d=json.load(open("/tmp/chat.json"))
          ans=(d.get("answer") or "")
          assert len(ans) > 20, d
          print("answer_preview:", ans[:200])
          PY

      - name: Trigger Pages rebuild
        if: steps.url.outputs.worker_url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Kick main CI so build-config.js picks up CHAT_API_BASE
          gh workflow run "CI → Deploy to GitHub Pages" --ref main || true
          echo "- Triggered GitHub Pages deploy workflow" >> "$GITHUB_STEP_SUMMARY"
