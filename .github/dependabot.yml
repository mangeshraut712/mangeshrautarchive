version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 8
    labels:
      - 'dependencies'
      - 'javascript'
    groups:
      eslint-stack:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'globals'
      stylelint-stack:
        patterns:
          - 'stylelint*'
      playwright-stack:
        patterns:
          - '@playwright/*'
          - '@axe-core/*'
      vitest-stack:
        patterns:
          - 'vitest'
          - 'jsdom'
      formatting:
        patterns:
          - 'prettier'
    ignore:
      # @eslint/js v10 requires eslint v10; repo stays on eslint 9 until a coordinated upgrade.
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      # stylelint v17 needs stylelint-config-standard v37+.
      - dependency-name: 'stylelint'
        update-types: ['version-update:semver-major']
      # react-dom v19 requires react v19; liquid-glass-oss still targets react 18.
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'ci'
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: 'pip'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'python'
    groups:
      python-runtime:
        patterns:
          - 'fastapi'
          - 'pydantic'
          - 'uvicorn'
          - 'httpx'
          - 'starlette'
